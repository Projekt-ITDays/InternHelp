services:
  api:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
       - "30000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - app-network

  web:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks: 
      - app-network
networks:
  app-network:
    driver: bridge
