services:

  db:
    image: postgres:15-alpine 
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER= ${DB_USER:-postgres}
      - POSTGRES_PASSWORD= ${DB_PASSWORD:-password}
      - POSTGRES_DB= ${DB_NAME:-intern_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
  api:
    build:
      context: ./backend
      dockerfile: dockerfile
    depends_on:
      - db
    ports:
       - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME= ${DB_USER:-postgres}
      - DB_PASSWORD= ${DB_PASSWORd:-password}
      - DB_NAME= ${DB_NAME:-intern_db}
    networks:
      - app-network

  web:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks: 
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  postgres-data: