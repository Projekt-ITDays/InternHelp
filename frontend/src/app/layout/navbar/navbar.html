<header class="sticky top-0 z-50 w-full border-b border-[var(--ih-border-dark)] bg-[#1a1713]/90 backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-[1600px] items-center justify-between px-6">

        <span class="text-xl font-bold tracking-tight text-[var(--ih-surface)]">
            <span class="text-[var(--ih-accent)]">Carrier</span>Sign
        </span>

        <div class="flex items-center gap-4">
            <button id="header-search" title="Szukaj"
                class="flex items-center justify-center text-[var(--ih-accent)] transition-colors hover:text-[var(--ih-accent-strong)]">
                <ng-icon name="heroMagnifyingGlass" size="20" />
            </button>

            <button id="header-settings" title="Ustawienia"
                class="flex items-center justify-center text-[var(--ih-accent)] transition-colors hover:text-[var(--ih-accent-strong)]">
                <ng-icon name="heroCog6Tooth" size="20" />
            </button>

            <button id="header-notifications" title="Powiadomienia"
                class="relative flex items-center justify-center text-[var(--ih-accent)] transition-colors hover:text-[var(--ih-accent-strong)]">
                <ng-icon name="heroBell" size="20" />
                <span
                    class="absolute -right-1 -top-1 flex h-4 w-4 items-center justify-center rounded-full bg-[var(--ih-accent)] text-[10px] font-bold text-white">
                    {{ notifications().length }}
                </span>
            </button>

            <div
                class="ml-1 flex h-9 w-9 items-center justify-center rounded-full border-2 border-[var(--ih-accent)] bg-[#3e2f23] text-sm font-bold text-[var(--ih-accent)]">
                JD
            </div>
        </div>
    </div>
</header>
