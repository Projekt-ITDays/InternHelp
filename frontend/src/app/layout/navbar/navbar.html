<header class="global-nav">
  <div class="nav-container">
    <div class="logo-section" (click)="navigateTo('/')">
      <span class="logo-accent">Career</span>Sign
    </div>
    <div class="theme-button">
      <label class="theme-switch" title="Przełącz motyw">
        <input type="checkbox" [checked]="themeService.isDarkMode()" (change)="themeService.toggleTheme()" aria-label="Przełącz motyw" />
        <span class="slider">
          <ng-icon class="icon-left" name="heroMoon" size="14"></ng-icon>
          <span class="thumb"></span>
          <ng-icon class="icon-right" name="heroSun" size="14"></ng-icon>
        </span>
      </label>
    </div>

    <div class="nav-grid">
      <div class="nav-tile" [class.is-active]="isActive('/')" (click)="navigateTo('/')" title="Logowanie">
        <ng-icon name="heroArrowRightOnRectangle" size="18"></ng-icon>
        <span>Logowanie</span>
      </div>
      <div class="nav-tile" [class.is-active]="isActive('/ai/ask')" (click)="navigateTo('/ai/ask')" title="Generacja">
        <ng-icon name="heroSparkles" size="18"></ng-icon>
        <span>Generacja</span>
      </div>
      <div class="nav-tile" [class.is-active]="isActive('/dashboard')" (click)="navigateTo('/dashboard')" title="Dashboard">
        <ng-icon name="heroChartBarSquare" size="18"></ng-icon>
        <span>Dashboard</span>
      </div>
      <div class="nav-tile" [class.is-active]="isActive('/survey')" (click)="navigateTo('/survey')" title="Ankieta">
        <ng-icon name="heroClipboardDocumentList" size="18"></ng-icon>
        <span>Ankieta</span>
      </div>
    </div>

    <div class="user-section">
      <div class="user-menu">
        <button class="user-avatar" type="button" aria-haspopup="true" aria-label="Menu użytkownika">
          JD
        </button>
        <div class="user-dropdown">
          <button class="dropdown-item" type="button" (click)="logout()">
            <ng-icon name="heroArrowRightOnRectangle" size="16"></ng-icon>
            <span>Wyloguj</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
