<section class="dashboard-page">
	<header class="top-bar">
		<img src="/brand/internhelp-logo.svg" alt="InternHelp" class="brand-logo" />

		<app-plan-menu
			[plans]="plans()"
			[selectedPlanId]="selectedPlanId()"
			currentPage="dashboard"
			(createPlan)="onCreatePlan()"
			(deletePlan)="onDeletePlan($event)"
			(selectPlan)="onSelectPlan($event)"
		/>
	</header>

	<main class="dashboard-content">
		@if (selectedPlanNumber() !== null) {
			<article class="plan-card">
				<p class="plan-label">Wybrany plan</p>
				<h2>Plan {{ selectedPlanNumber() }}</h2>
				<p>
					To jest placeholder pod szczegoly planu. Kolejny krok to renderowanie zawartosci planu
					na tej stronie.
				</p>
			</article>
		} @else {
			<article class="plan-card is-empty">
				<h2>Brak planow</h2>
				<p>Dodaj nowy plan z menu w prawym gornym rogu.</p>
			</article>
		}
	</main>
</section>
