<mat-form-field class="uczelnia-field" appearance="outline" subscriptSizing="dynamic">
  <input
    type="text"
    matInput
    [formControl]="uczelniaControl"
    placeholder="Wybierz uczelnie"
    aria-label="Uczelnia"
    autocomplete="off"
    [matAutocomplete]="uczelniaAutocomplete"
  />

  <mat-autocomplete #uczelniaAutocomplete="matAutocomplete" autoActiveFirstOption class="uczelnia-panel">
    @for (name of filteredUniversityNames; track name) {
      <mat-option [value]="name">{{ name }}</mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
