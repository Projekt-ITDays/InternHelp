<div class="university-picker">
  <input
    type="text"
    class="university-input"
    [formControl]="universityControl"
    placeholder="Wybierz uczelnię"
    aria-label="Uczelnia"
    aria-autocomplete="list"
    [attr.aria-expanded]="isDropdownOpen"
    autocomplete="off"
    (click)="$event.stopPropagation()"
    (focus)="onInputFocus()"
    (blur)="onInputBlur()"
  />

  @if (isDropdownOpen && filteredUniversityNames.length > 0) {
    <div class="university-panel" role="listbox" aria-label="Lista uczelni">
      @for (name of filteredUniversityNames; track name) {
        <button
          type="button"
          class="university-option"
          role="option"
          [title]="name"
          (mousedown)="$event.preventDefault()"
          (click)="onOptionClick(name)"
        >
          {{ name }}
        </button>
      }
    </div>
  }
</div>
