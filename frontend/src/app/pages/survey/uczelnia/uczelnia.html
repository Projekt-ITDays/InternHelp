<mat-form-field class="university-field" appearance="outline" subscriptSizing="dynamic">
  <input
    type="text"
    matInput
    [formControl]="universityControl"
    placeholder="Wybierz uczelnię"
    aria-label="Uczelnia"
    autocomplete="off"
    [matAutocomplete]="universityAutocomplete"
  />

  <mat-autocomplete #universityAutocomplete="matAutocomplete" autoActiveFirstOption class="university-panel">
    @for (name of filteredUniversityNames; track name) {
      <mat-option [value]="name">{{ name }}</mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
