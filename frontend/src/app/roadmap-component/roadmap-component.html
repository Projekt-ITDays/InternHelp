<div class="app-container">
  <header class="top-header">
    <button class="btn-primary" (click)="goBack()">← Wróć</button>
    <div class="logo">Roadmapa: {{ careerPath }}</div>
  </header>

  <main class="main-content">
    <div class="results-section">
      <div class="title-section">
        <h1>Twoja dedykowana ścieżka 🗺️</h1>
        <p *ngIf="isGenerating">Sztuczna inteligencja właśnie przygotowuje dla Ciebie plan działania...</p>
        <p *ngIf="!isGenerating">Oto Twój kompletny plan działania!</p>
      </div>

      <div class="error-box" *ngIf="errorMessage">
        🚨 {{ errorMessage }}
      </div>

      <div class="roadmap-box">
        <pre>
{{ roadmapContent }}<span class="cursor" *ngIf="isGenerating">▋</span>
        </pre>
      </div>
    </div>
  </main>
</div>
