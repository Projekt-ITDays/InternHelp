<nav class="plan-menu" (mouseenter)="onMenuEnter()" (mouseleave)="onMenuLeave()">
  @if (!isExpanded) {
    <button
      type="button"
      class="menu-trigger desktop-trigger"
      aria-label="Menu planow"
      [attr.aria-expanded]="isExpanded"
      (focus)="onMenuEnter()"
    >
      <span class="trigger-line"></span>
      <span class="trigger-line"></span>
      <span class="trigger-line"></span>
    </button>
  }

  <button
    type="button"
    class="menu-trigger mobile-trigger"
    aria-label="Menu planow"
    [attr.aria-expanded]="isMobileOpen()"
    (click)="onMenuTriggerClick()"
  >
    <span class="trigger-line"></span>
    <span class="trigger-line"></span>
    <span class="trigger-line"></span>
  </button>

  <div class="menu-panel" [class.is-open]="isExpanded" [class.is-mobile-open]="isMobileOpen()">
    @if (canCreatePlan) {
      <button type="button" class="menu-action create-action" (click)="onCreatePlan()">
        Utworz nowy plan
      </button>
    }

    @if (plans.length === 0) {
      <p class="empty-state">Brak planow. Dodaj pierwszy plan.</p>
    }

    @for (plan of plans; track plan.id) {
      <div class="plan-row" [class.is-active]="plan.id === selectedPlanId">
        <button type="button" class="menu-action plan-action" (click)="onSelectPlan(plan.id)">
          Plan {{ plan.number }}
        </button>

        <button
          type="button"
          class="delete-plan"
          (click)="onDeletePlan(plan.id, $event)"
          [attr.aria-label]="'Usun plan ' + plan.number"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M9 3.75h6m-7.5 3h9l-.76 11.27a1.5 1.5 0 0 1-1.5 1.4H9.76a1.5 1.5 0 0 1-1.5-1.4L7.5 6.75Zm2.4 3.35v5.8m4.2-5.8v5.8"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    }

    <a
      routerLink="/settings"
      class="menu-action settings-action"
      [class.is-current]="currentPage === 'settings'"
    >
      Ustawienia
    </a>
  </div>
</nav>
