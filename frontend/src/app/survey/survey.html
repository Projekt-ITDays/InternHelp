<section class="survey-shell">
    <article class="survey-card">
        <header class="survey-header">
            <p class="survey-kicker">Profil kandydata</p>
            <h1>Ankieta stażowa</h1>
            <p>Uzupełnij pola, aby przygotować precyzyjny plan rozwoju i dopasowane rekomendacje.</p>
        </header>

        <form class="survey-form" #surveyForm="ngForm" (ngSubmit)="onSubmit()">
            <div class="form-grid">
                

                <label class="form-group">
                    <span>Kierunek (Major)</span>
                    <input type="text" name="Major" [(ngModel)]="surveyModel.Major" required />
                </label>

                <label class="form-group">
                    <span>Rok studiów</span>
                    <input type="number" min="1" name="YearOfStudy" [(ngModel)]="surveyModel.YearOfStudy" required />
                </label>

                <label class="form-group">
                    <span>Typ preferowanego stażu</span>
                    <input
                        type="text"
                        name="PreferredInternshipType"
                        [(ngModel)]="surveyModel.PreferredInternshipType"
                        required
                    />
                </label>

                <label class="form-group">
                    <span>Ile czasu możesz poświęcić (miesiące)</span>
                    <select name="TimeLeft" [(ngModel)]="surveyModel.TimeLeft" required>
                        @for (range of timeRangestoChoose; track $index) {
                            <option [value]="range">{{ range }}</option>
                        }
                    </select>
                </label>

                <label class="form-group full-width">
                    <span>Zainteresowania</span>
                    <textarea name="Inrest" rows="3" [(ngModel)]="surveyModel.Inrest" required></textarea>
                </label>

                <label class="form-group full-width">
                    <span>Doświadczenie</span>
                    <textarea name="Expierience" rows="3" [(ngModel)]="surveyModel.Expierience" required></textarea>
                </label>

                <label class="form-group full-width">
                    <span>Umiejętności</span>
                    <textarea name="skills" rows="2" [(ngModel)]="surveyModel.skills" required></textarea>
                </label>

                <label class="form-group">
                    <span>Poziom umiejętności</span>
                    <select name="AbilitiesLevel" [(ngModel)]="surveyModel.AbilitiesLevel" required>
                        @for (level of abilityLevels; track $index) {
                            <option [value]="level">{{ level }}</option>
                        }
                    </select>
                </label>

                <label class="form-group full-width">
                    <span>Projekty poboczne / hobby</span>
                    <textarea name="SideProjectsHobby" rows="2" [(ngModel)]="surveyModel.SideProjectsHobby" required></textarea>
                </label>

                <label class="form-group">
                    <span>Mocne strony</span>
                    <input type="text" name="Strengths" [(ngModel)]="surveyModel.Strengths" required />
                </label>

                <label class="form-group">
                    <span>Słabe strony</span>
                    <input type="text" name="Weaknesses" [(ngModel)]="surveyModel.Weaknesses" required />
                </label>

                <label class="form-group">
                    <span>Uczelnia</span>
                    <input type="text" name="University" [(ngModel)]="surveyModel.University" required />
                </label>

                <label class="form-group">
                    <span>Rok ukończenia</span>
                    <input
                        type="number"
                        min="2000"
                        name="GraduationYear"
                        [(ngModel)]="surveyModel.GraduationYear"
                        required
                    />
                </label>
            </div>

            <footer class="actions">
                <button type="submit" [disabled]="surveyForm.invalid">Zapisz ankietę</button>
            </footer>
        </form>
    </article>
</section>
